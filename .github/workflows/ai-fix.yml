name: ai-fix

on:
  pull_request:
    types: [labeled]
  # review.yml uses secrets.BOT_PAT (user PAT with repo + workflow scope)
  # when adding `ai-fix`, so this workflow fires as a user-labeled event
  # — bypassing GITHUB_TOKEN loop guard. Manual UI re-add also works.
  # See docs/HARNESS-PITFALLS.md §C7.

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-fix-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  guard:
    name: Round counter (cap at 3) + PR-still-open check
    if: github.event.label.name == 'ai-fix' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    outputs:
      round: ${{ steps.counter.outputs.round }}
      escalate: ${{ steps.counter.outputs.escalate }}
      proceed: ${{ steps.live_state.outputs.proceed }}
    steps:
      - name: Skip if PR already merged / closed (live re-check)
        id: live_state
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # event payload may be stale if run was queued — re-fetch live PR state
          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "::notice::PR #$PR_NUMBER is $STATE (not OPEN) — skipping ai-fix"
            echo "proceed=false" >> $GITHUB_OUTPUT
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Read round counter from PR body
        if: steps.live_state.outputs.proceed == 'true'
        id: counter
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/<!-- AI-FIX-STATE\s*Round:\s*(\d+)\/3/);
            const current = match ? parseInt(match[1], 10) : 0;
            const next = current + 1;
            core.setOutput('round', String(next));
            core.setOutput('escalate', next > 3 ? 'true' : 'false');
            core.info(`Round counter: ${current} → ${next} (escalate=${next > 3})`);

      - name: Escalate to human-review if cap reached
        if: steps.live_state.outputs.proceed == 'true' && steps.counter.outputs.escalate == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            await github.rest.issues.removeLabel({
              ...context.repo, issue_number: pr, name: 'ai-fix',
            }).catch(() => {});
            await github.rest.issues.addLabels({
              ...context.repo, issue_number: pr,
              labels: ['human-review', 'agent/human-needed'],
            });
            await github.rest.issues.createComment({
              ...context.repo, issue_number: pr,
              body: '⚠️ AI fix loop exceeded 3 rounds. Escalating to human review. Automation paused on this PR.',
            });
            core.setFailed('AI fix cap reached');

  fix:
    name: Local Claude Code · /fix-pr
    needs: guard
    if: needs.guard.outputs.escalate == 'false' && needs.guard.outputs.proceed == 'true'
    # GitHub-hosted ubuntu → 跨 PR 並行。原本 self-hosted runner-fix lane 保留
    # 給臨時 fallback；正常情況下都走 ubuntu。
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      ROUND: ${{ needs.guard.outputs.round }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # BOT_PAT so subsequent `git push` triggers ci.yml.
          # GITHUB_TOKEN pushes hit GitHub's loop guard and don't fire
          # downstream workflows — breaks the fix-loop chain.
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node + install pnpm (for project deps in /fix-pr context)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - name: Install claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Configure git for commits
        run: |
          git config user.name "claude-code-fix-bot"
          git config user.email "claude-code-fix@local"

      - name: Run /fix-pr
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          echo "→ Fixing PR #${PR_NUMBER} round ${ROUND}/3"
          claude --model sonnet -p "/fix-pr ${PR_NUMBER}" \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Edit,Write,Grep,Bash(gh:*),Bash(git:*),Bash(make:*),Bash(pnpm:*),Bash(node:*),Bash(jq:*)" \
            --output-format text \
            --no-session-persistence \
            --setting-sources project,local

      - name: Update PR round counter
        if: always()
        uses: actions/github-script@v7
        env:
          ROUND: ${{ needs.guard.outputs.round }}
        with:
          script: |
            const pr = await github.rest.pulls.get({
              ...context.repo, pull_number: context.payload.pull_request.number,
            });
            const round = process.env.ROUND;
            const now = new Date().toISOString();
            const block = `<!-- AI-FIX-STATE\nRound: ${round}/3\nLast: ${now}\n-->`;
            let body = pr.data.body || '';
            if (/<!-- AI-FIX-STATE[\s\S]*?-->/.test(body)) {
              body = body.replace(/<!-- AI-FIX-STATE[\s\S]*?-->/, block);
            } else {
              body = body + "\n\n" + block + "\n";
            }
            await github.rest.pulls.update({
              ...context.repo, pull_number: pr.data.number, body,
            });

      - name: Remove ai-fix label so re-review can trigger
        if: always()
        run: |
          # `gh pr edit --remove-label` fails with exit 1 on repos affected by
          # GitHub's Projects-classic deprecation GraphQL warning, AND silently
          # fails to actually remove the label. Use the REST API directly.
          set +e
          gh api -X DELETE "repos/${REPO}/issues/${PR_NUMBER}/labels/ai-fix" >/dev/null 2>&1
          exit 0

      - name: Notify on failure
        if: failure()
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "⚠️ Local \`/fix-pr\` session failed on self-hosted runner (round ${ROUND}/3). See workflow run logs."
