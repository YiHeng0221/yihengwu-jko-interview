name: ci

# The workflow name MUST stay "ci" — review.yml's trigger references it by name.
#
# Jobs:
#   size-guard   — PR only: reject PRs > 800 LoC (AGENTS.md Hard Rule #11)
#   secret-scan  — always: gitleaks detect
#   quality      — always: install → typecheck → lint → test → build → types-drift
#   label        — PR only, needs all above: tag ai-review so review.yml fires

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── PR size guard ─────────────────────────────────────────────────────────
  size-guard:
    name: PR size guard (≤ 800 LoC)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR diff size (excluding auto-generated files)
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 排除 lockfile / snapshot 等自動產生檔，
          # 因為這些檔 line count 跟 PR 的「人類審 review effort」不成比例。
          total=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '
            [.files[]
              | select(.path | endswith("pnpm-lock.yaml") | not)
              | select(.path | endswith("package-lock.json") | not)
              | select(.path | endswith("yarn.lock") | not)
              | select(.path | endswith(".snap") | not)
              | .additions + .deletions
            ] | add // 0')
          raw=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json additions,deletions \
            --jq '.additions + .deletions')
          echo "PR size (excluding lockfile / snapshot): ${total} LoC"
          echo "Raw additions + deletions (incl. generated): ${raw} LoC"
          if [ "$total" -gt 800 ]; then
            echo "::error::PR exceeds 800 LoC limit (${total} lines, excluding generated). Split per AGENTS.md Hard Rule #11."
            exit 1
          fi
          echo "✅ PR size: ${total} LoC ≤ 800"

  # ─── Secret scan ───────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --exit-code 1

  # ─── Quality: typecheck / lint / test / build / types-drift ────────────────
  quality:
    name: Quality (typecheck / lint / test / build / types-drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::No pnpm-lock.yaml — workspaces not yet initialised (bootstrap phase)"
            pnpm install
          fi

      - name: Generate Prisma client (backend only, if schema exists)
        run: |
          # backend code imports types from @prisma/client (PrismaClient, Prisma.*, model
          # types). These types are emitted by `prisma generate`, NOT shipped in the npm
          # package. Without this step, `tsc --noEmit` fails with TS2305 'has no exported
          # member' on any file referencing Prisma types.
          if [ -f backend/prisma/schema.prisma ]; then
            pnpm --filter @yihengwu-jko/backend exec prisma generate
          else
            echo "::notice::backend/prisma/schema.prisma missing — skip prisma generate"
          fi

      - name: Typecheck
        run: |
          if [ -f backend/package.json ] || [ -f frontend/package.json ] || [ -f e2e/package.json ]; then
            pnpm -r run typecheck
          else
            echo "::notice::No workspace packages — typecheck skipped (workspaces not yet initialised)"
          fi

      - name: Lint
        run: |
          if [ -f backend/package.json ] || [ -f frontend/package.json ] || [ -f e2e/package.json ]; then
            pnpm -r run lint
          else
            echo "::notice::No workspace packages — lint skipped (workspaces not yet initialised)"
          fi

      - name: Test
        run: |
          if [ -f backend/package.json ] || [ -f frontend/package.json ] || [ -f e2e/package.json ]; then
            pnpm -r run test
          else
            echo "::notice::No workspace packages — tests skipped (workspaces not yet initialised)"
          fi

      - name: Build
        run: |
          if [ -f backend/package.json ] || [ -f frontend/package.json ] || [ -f e2e/package.json ]; then
            pnpm -r run build
          else
            echo "::notice::No workspace packages — build skipped (workspaces not yet initialised)"
          fi

      - name: Types drift (openapi.json) — advisory only
        continue-on-error: true
        run: |
          # multi-PR 並行情境下，每個 BE PR 各自加 endpoint 都會讓 openapi.json drift。
          # 強制 fail 會把所有 BE PR 互鎖，必須每個 PR commit openapi.json，但 merge 順序
          # 又改變最終結果 → 鎖死。改成 advisory：regenerate 後若有 diff 發 warning 但不 fail。
          # 真正的 type contract drift（FE 引用 generated types 不對齊）在 frontend typecheck
          # 階段自然會被抓。
          if [ -d backend ]; then
            make types || true
            if ! git diff --exit-code; then
              echo "::warning::openapi.json drift detected — please regenerate + commit before final merge"
            fi
          else
            echo "::notice::No backend directory — types-drift check skipped (backend not yet initialised)"
          fi

  # ─── Tag PR for AI review ──────────────────────────────────────────────────
  label:
    name: Tag PR for AI review
    if: github.event_name == 'pull_request'
    needs: [size-guard, secret-scan, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Add ai-review label
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # gh pr edit --add-label silently fails (Projects-classic GraphQL deprecation).
          # Use REST API directly.
          set +e
          echo '{"labels":["ai-review"]}' | gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/labels" --input - >/dev/null 2>&1
          echo "::notice::PR #$PR_NUMBER tagged ai-review. review.yml will chain off this run's completion."
          exit 0
