name: review

# `pull_request: labeled` doesn't fire when the label is set by another
# workflow using GITHUB_TOKEN (GH built-in loop guard).
# Chain off `workflow_run` from ci.yml's success instead.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  # Allow manual re-trigger via gh CLI or UI on a specific PR.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # Serialise reviews per PR so a re-trigger doesn't race with an in-flight session.
  # Prefix with event_name so a branch literally named "17" can't collide with PR #17 (RR-001 nit).
  group: review-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve PR number
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.derive.outputs.pr }}
      proceed: ${{ steps.derive.outputs.proceed }}
    steps:
      - id: derive
        env:
          # BOT_PAT (with `repo` + `workflow` scopes) is used instead of
          # GITHUB_TOKEN so that label changes (notably `ai-fix`) made by
          # this workflow trigger downstream workflows (ai-fix.yml's
          # pull_request: labeled). GitHub's loop guard suppresses events
          # generated by GITHUB_TOKEN; a PAT is treated as a user event.
          # Falls back to GITHUB_TOKEN if BOT_PAT not configured.
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
          # Pass the event as an env var instead of expanding into a heredoc;
          # avoids breakage if the payload contains a single quote (RR-001 nit).
          EVENT_JSON: ${{ toJson(github.event) }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR="$INPUT_PR"
            # Reject draft PRs on the manual dispatch path; ci.yml's
            # tag-for-review job already filters drafts on the automated path (RR-001 nit).
            IS_DRAFT=$(gh pr view "$PR" --repo "$REPO" --json isDraft --jq '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "::notice::PR #$PR is a draft — skipping review"
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            # workflow_run path: read the associated PR from the event payload
            PR=$(printf '%s' "$EVENT_JSON" | jq -r '.workflow_run.pull_requests[0].number // empty')
            if [ -z "$PR" ]; then
              echo "::warning::workflow_run had no associated PR — skipping"
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          # Verify PR has ai-review label (signal from ci.yml that review is wanted)
          HAS_LABEL=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name' | grep -c '^ai-review$' || true)
          if [ "$HAS_LABEL" -eq 0 ]; then
            echo "::notice::PR #$PR has no ai-review label — skipping"
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "pr=$PR" >> $GITHUB_OUTPUT
          echo "proceed=true" >> $GITHUB_OUTPUT

  review:
    name: Local Claude Code · /review
    needs: resolve
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: [self-hosted, runner-review]
    timeout-minutes: 20
    env:
      # See `resolve` job for why we use BOT_PAT instead of GITHUB_TOKEN.
      GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ needs.resolve.outputs.pr }}
      REPO: ${{ github.repository }}
    steps:
      - name: Get PR head SHA
        id: prinfo
        run: |
          SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.prinfo.outputs.sha }}
          fetch-depth: 0

      - name: Sanity — claude CLI present
        run: |
          if ! command -v claude >/dev/null; then
            echo "::error::claude CLI not found on PATH. The self-hosted runner user needs Claude Code installed."
            exit 1
          fi
          claude --version

      - name: Sanity — gh CLI authenticated
        run: gh auth status

      - name: Run /review (sonnet, single-pass)
        id: review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HOME: /Users/wuyiheng
        run: |
          set -euo pipefail
          echo "→ Reviewing PR #${PR_NUMBER} (sonnet, single-pass)"
          # Speed optimisation (2026-05-24): use sonnet instead of opus for review
          # (~3× faster, sufficient quality for current scope of PRs). Cross-agent
          # second pass dropped — for small/medium PRs the additional latency cost
          # outweighs marginal coverage gain. Re-enable --cross + opus for PRs
          # touching auth, payments, schema migrations, or anything security-critical.
          # Persona override lives inside .claude/commands/review.md (no leak).
          claude --model sonnet -p "/review ${PR_NUMBER}" \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Edit,Write,Grep,Bash(gh:*),Bash(git diff:*),Bash(git log:*),Bash(git status),Bash(make types-check),Bash(jq:*)" \
            --output-format text \
            --no-session-persistence \
            --setting-sources project,local

      - name: Always remove ai-review label (success or fail)
        if: always()
        run: |
          # gh pr edit --remove-label silently fails on this repo (Projects-classic GraphQL).
          set +e; gh api -X DELETE "repos/${REPO}/issues/${PR_NUMBER}/labels/ai-review" >/dev/null 2>&1; exit 0

      - name: Notify on failure
        if: failure()
        run: |
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "⚠️ Local \`/review\` session failed on self-hosted runner. See workflow run logs. Push a new commit to retrigger."
