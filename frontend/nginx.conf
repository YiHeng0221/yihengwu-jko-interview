server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (OWASP A05:2021)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'" always;

    # Gzip compression for text-based assets
    gzip on;
    gzip_types text/html text/css text/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets aggressively; Vite fingerprints them
    # Security headers repeated here because nginx add_header inheritance stops
    # at the first level that defines its own add_header directives.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'" always;
    }

    # Do not cache index.html so clients always get the latest shell
    # Security headers repeated here for the same inheritance reason.
    location = /index.html {
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'" always;
    }
}
